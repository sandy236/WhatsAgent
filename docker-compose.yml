version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
    environment:
      DATABASE_URL: sqlite:////data/app.db
      CHROMA_DIR: /data/chromadb
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      CORS_ORIGINS: '*'
    depends_on:
      - ollama
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
  ollama:
    image: ghcr.io/ollama/ollama:latest
    ports:
      - '11434:11434'
    command: ['server', '--http']
    restart: unless-stopped
  wa-gateway:
    build:
      context: ./wa-gateway
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./wa-gateway/session:/app/session
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
